# cargo-deny configuration.
# Install: cargo install cargo-deny
# Run:     cargo deny check
#
# Minimal config — let cargo-deny 0.19+ use its defaults for advisories
# and licenses. Only configure bans and sources.

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "warn"
unknown-git = "deny"
allow-git = []
