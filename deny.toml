# cargo-deny configuration.
# Install: cargo install cargo-deny
# Run:     cargo deny check

[advisories]
ignore = [
    { id = "RUSTSEC-2025-0009", reason = "ring AES overflow only in debug mode; ring 0.17.12+ requires cc >= 1.0.91 which conflicts with tree-sitter-javascript 0.21.4" },
    { id = "RUSTSEC-2025-0119", reason = "number_prefix unmaintained — transitive dep of indicatif; no replacement without updating fastembed" },
    { id = "RUSTSEC-2024-0436", reason = "paste unmaintained — transitive dep of pyo3-macros-backend; no replacement without updating pyo3" },
]

[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Zlib",
    "0BSD",
    "OpenSSL",
    "Unicode-3.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "warn"
unknown-git = "deny"
allow-git = []
